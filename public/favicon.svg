<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rankgim favicon — v4 parchment (fixed laurel) -->
  <!-- Background: cream parchment with rounded corners -->
  <rect width="64" height="64" rx="10" fill="#f5f0e1"/>

  <!-- Left wreath: stem + leaves growing outward (to the left) only -->
  <g stroke="#3f2d1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem arc -->
    <path d="M14 18 Q 10 32 14 48" fill="none"/>
    <!-- Leaves: each starts on the stem and extends outward -->
    <path d="M13.2 22 Q 8 21 6 24 Q 9 26 13.2 22 Z" fill="#5b8c3e"/>
    <path d="M12.2 28 Q 7 27 5 30 Q 8 32 12.2 28 Z" fill="#5b8c3e"/>
    <path d="M12 34 Q 6.8 33 4.8 36 Q 7.8 38 12 34 Z" fill="#5b8c3e"/>
    <path d="M12.4 40 Q 7.2 39 5.2 42 Q 8.2 44 12.4 40 Z" fill="#5b8c3e"/>
    <path d="M13.6 46 Q 8.4 45 6.4 48 Q 9.4 50 13.6 46 Z" fill="#5b8c3e"/>
  </g>

  <!-- Right wreath: mirror of the left -->
  <g stroke="#3f2d1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 18 Q 54 32 50 48" fill="none"/>
    <path d="M50.8 22 Q 56 21 58 24 Q 55 26 50.8 22 Z" fill="#5b8c3e"/>
    <path d="M51.8 28 Q 57 27 59 30 Q 56 32 51.8 28 Z" fill="#5b8c3e"/>
    <path d="M52 34 Q 57.2 33 59.2 36 Q 56.2 38 52 34 Z" fill="#5b8c3e"/>
    <path d="M51.6 40 Q 56.8 39 58.8 42 Q 55.8 44 51.6 40 Z" fill="#5b8c3e"/>
    <path d="M50.4 46 Q 55.6 45 57.6 48 Q 54.6 50 50.4 46 Z" fill="#5b8c3e"/>
  </g>

  <!-- Bottom ribbon tie -->
  <path d="M27 51 L 32 47 L 37 51" fill="none" stroke="#3f2d1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Letter R — Cinzel-style serif (system fallback to Times) -->
  <text x="32" y="42" font-family="Cinzel, 'Times New Roman', serif" font-size="30" font-weight="700"
        text-anchor="middle" fill="#3f2d1a">R</text>
</svg>
